<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
        }
        .percentage {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .link {
            margin-top: 10px;
            word-break: break-all;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .nav-btn {
            background: white;
            color: #667eea;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
        }
        .nav-btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Plagiarism Checker</h1>
        
        <div class="nav-buttons">
            <a href="/" class="nav-btn">Text/File Check</a>
            <a href="/compare/" class="nav-btn">Compare Two Texts</a>
        </div>
        
        <div class="card">
            <h2>📝 Check Text for Plagiarism</h2>
            <form method="POST" action="/test/">
                {% csrf_token %}
                <textarea name="q" rows="6" placeholder="Enter your text here..."></textarea>
                <br>
                <button type="submit">Check Plagiarism</button>
            </form>
        </div>
        
        <div class="card">
            <h2>📁 Upload File to Check</h2>
            <form method="POST" action="/filetest/" enctype="multipart/form-data">
                {% csrf_token %}
                <input type="file" name="docfile" accept=".txt,.docx,.pdf">
                <br>
                <button type="submit">Upload & Check</button>
            </form>
        </div>
        
        {% if percent %}
        <div class="result">
            <h3>Plagiarism Detection Result</h3>
            <div class="percentage">{{ percent }}%</div>
            <div class="link">
                <strong>Similar content found at:</strong><br>
                <a href="{{ link }}" target="_blank">{{ link }}</a>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
